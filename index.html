<body>
  <div class="d-flex flex-wrap justify-content-center align-items-center vh-100 col-12">
    <div class="card text-center col-11 col-md-5 col-lg-4">
      <div class="card-body h-100">
        <div class="d-flex flex-row justify-content-evenly align-items-center">
          <div class="d-flex flex-column justify-content-center align-items-center">
            <img src="images/office_building_ping.png" alt="Location Pin Icon" style="max-width: 100px;">
            <h5 class="p-3">Ashraf Islam Engineering Building</h5>
          </div>
          <div class="vr"></div> <!-- I got this class from this documentation: https://getbootstrap.com/docs/5.1/helpers/vertical-rule/ -->
          <div class="d-flex flex-column justify-content-center align-items-center">
            <h5 class="p-3">Current Weather</h5>
          
          <hr>
          <div class="d-flex flex-column justify-content-evenly align-items-center">
            <div class="flex-row">
              <i class="fa-solid fa-cloud"></i>
              <p>Temperature</p>
            </div>
            <div class="flex-row justify-content-evenly align-content-center">
              <i class="fa-regular fa-cloud"></i>
              <p>Apparent Temperature</p>
            </div>
            <div class="flex-row">
              <i class="fa-regular fa-sun"></i>
              <p>UV Index</p>
            </div>
            <div class="flex-row">
              <i class="fa-solid fa-sun"></i>
              <p>Relative Humidity</p>
            </div>
            <div class="flex-row">
              <i class="fa-solid fa-cloud-rain"></i>
              <p>Precipitation Probability</p>
            </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
