<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Weather Widget</title>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="apple-touch-icon" href="/images/60x60WeatherAppIcon.png">
  <link rel="apple-touch-icon" sizes="60x60" href="/images/72x72WeatherAppIcon.png">
  <link rel="apple-touch-icon" sizes="114x114" href="/images/120x120WeatherAppIcon.png">
  <link rel="apple-touch-icon" sizes="144x144" href="/images/152x152WeatherAppIcon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link href="bootstrap_cyborg.min.css" rel="stylesheet">
</head>
<body>
  <div class="d-flex flex-wrap justify-content-center align-items-center vh-100 col-12">
    <div class="card text-center col-11 col-md-5 col-lg-4">
      <div class="card-body h-100 w-100">
        <div class="d-flex flex-row justify-content-evenly align-items-center">
          <div class="d-flex flex-column justify-content-center align-items-center">
            <img src="images/office_building_ping.png" alt="Location Pin Icon" style="max-width: 100px;">
            <h5 class="p-3">Ashraf Islam Engineering Building</h5>
          </div>
          <div class="vr"></div> <!-- I got this class from this documentation: https://getbootstrap.com/docs/5.1/helpers/vertical-rule/ -->
          <div class="d-flex flex-column justify-content-center align-items-center">
            <h5 class="p-3">Current Weather</h5>
          
            <hr/>
            <div class="flex-row">
                <i class="fa-solid fa-cloud"></i>
                <i class="fa-regular fa-cloud"></i>
                <i class="fa-regular fa-sun"></i>
                <i class="fa-solid fa-sun"></i>
                <i class="fa-solid fa-cloud-rain"></i>
            
                <div class="flex-column justify-content-center align-items-center" id="txtWeatherData">
                
                </div>
              
          </div>
        </div>
      </div>
    </div>
    </div>
  </div>
  
  <script src="https://kit.fontawesome.com/2908bc75f3.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
  <script src=" https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js "></script>
  <script>
    const weatherAPI_URL = "https://api.open-meteo.com/v1/forecast?latitude=36.1748736&longitude=-85.5089051&hourly=uv_index,precipitation_probability&current=temperature_2m,relative_humidity_2m,apparent_temperature&timezone=America%2FChicago&forecast_days=1&wind_speed_unit=mph&temperature_unit=fahrenheit&precipitation_unit=inch"
    let divWeatherData = document.getElementById("txtWeatherData")
    let pCurrentTempElement = document.createElement("p")
    let pApparentTempElement = document.createElement("p")
    let pUVIndexElement = document.createElement("p")
    let pRelativeHumidityElement = document.createElement("p")
    let pPrecipitationProbElement = document.createElement("p")
    let pTXTContent = ""

    fetch(weatherAPI_URL)
    .then(objResponse => {
      if(!objResponse.ok)
      {
        throw new Error(`Bad HTTP Response: ${objResponse.status}`)
      }
      return objResponse.json()
    })
    .then(objWeatherData => {
      // This is for the current temperature
      pTXTContent = `Current Temperature ${objWeatherData.current.temperature_2m} °F`
      divWeatherData.appendChild(pCurrentTempElement)
      pCurrentTempElement.textContent = pTXTContent
      // This is for the apparent temperature
      pTXTContent = `Apparent Temperature: ${objWeatherData.current.apparent_temperature} °F`
      divWeatherData.appendChild(pApparentTempElement)
      pApparentTempElement.textContent = pTXTContent
      // this is for the UV Index
      pTXTContent = `UV Index: ${objWeatherData.hourly.uv_index[0]}`
      divWeatherData.appendChild(pUVIndexElement)
      pUVIndexElement.textContent = pTXTContent
      // this is for the relative humidity
      pTXTContent = `Relative Humidity: ${objWeatherData.current.relative_humidity_2m}`
      divWeatherData.appendChild(pRelativeHumidityElement)
      pRelativeHumidityElement.textContent = pTXTContent
      // this is for the precipitation probability
      pTXTContent = `Precipitation Probability: ${objWeatherData.hourly.precipitation_probability[0]}%`
      divWeatherData.appendChild(pPrecepitationProbElement)
      pPrecepitationProbElement.textContent = pTXTContent
    })
    .catch(error => console.error(error))

  </script>
</body>
</html>
